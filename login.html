<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Dana Video Angkatan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl max-w-md w-full p-8">
        <div class="text-center mb-6">
            <i class="fas fa-lock text-5xl text-blue-600 mb-3"></i>
            <h1 class="text-2xl font-bold text-gray-800">Dana Video Angkatan</h1>
            <p class="text-gray-500">Masuk untuk mengelola data</p>
        </div>
        <form id="loginForm" onsubmit="return false;">
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-bold mb-2">Username</label>
                <input type="text" id="username" class="w-full border border-gray-300 rounded-xl px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400" autocomplete="off">
            </div>
            <div class="mb-6">
                <label class="block text-gray-700 text-sm font-bold mb-2">Password</label>
                <input type="password" id="password" class="w-full border border-gray-300 rounded-xl px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
            </div>
            <button onclick="doLogin()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 rounded-xl transition flex items-center justify-center gap-2">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
        </form>
        <p class="text-center text-xs text-gray-400 mt-6">Hubungi ketua angkatan untuk mendapatkan akses</p>
    </div>
    <script>
        const VALID_USERNAME = "admin";
        const VALID_PASSWORD = "angkatan2025";
        function doLogin() {
            const username = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value;
            if (username === VALID_USERNAME && password === VALID_PASSWORD) {
                localStorage.setItem("isLoggedIn", "true");
                window.location.href = "dashboard.html";
            } else {
                alert("Username atau password salah!");
            }
        }
        if (localStorage.getItem("isLoggedIn") === "true") {
            window.location.href = "dashboard.html";
        }
    </script>
</body>
</html>
